<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tax Calculator | Nooriya Ilyas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 20px;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #6c63ff;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .back-btn:hover {
            color: #a78bfa;
        }

        .card {
            background: #1c1c1e;
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.8);
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        h1 {
            color: white;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: rgba(255,255,255,0.4);
            font-size: 0.9rem;
            margin-bottom: 35px;
        }

        label {
            color: rgba(255,255,255,0.6);
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: block;
            margin-bottom: 10px;
        }

        input {
            width: 100%;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 18px 20px;
            color: white;
            font-size: 1.1rem;
            margin-bottom: 25px;
            outline: none;
            transition: border 0.3s;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        input:focus {
            border-color: #6c63ff;
        }

        button {
            width: 100%;
            background: #6c63ff;
            color: white;
            border: none;
            border-radius: 15px;
            padding: 18px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        button:hover {
            background: #a78bfa;
            transform: translateY(-2px);
        }

        .result {
            margin-top: 25px;
            background: rgba(108,99,255,0.1);
            border: 1px solid rgba(108,99,255,0.2);
            border-radius: 20px;
            padding: 25px;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .result-row:last-child {
            border-bottom: none;
            padding-top: 15px;
        }

        .result-label {
            color: rgba(255,255,255,0.5);
            font-size: 0.9rem;
        }

        .result-value {
            color: white;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .result-total {
            color: #a78bfa;
            font-size: 1.3rem;
            font-weight: 700;
        }

        .tax-badge {
            display: inline-block;
            background: rgba(108,99,255,0.2);
            color: #a78bfa;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← Back to Portfolio</a>

    <div class="card">
        <div class="icon">💰</div>
        <h1>Tax Calculator</h1>
        <p class="subtitle">Enter your salary to calculate your tax</p>

        <label>Annual Salary</label>
        <input type="number" id="salary" placeholder="e.g. 50000" />

        <button onclick="calculateTax()">Calculate Tax</button>

        <div class="result" id="result">
            <div class="tax-badge" id="taxBadge">Tax Rate: 0%</div>
            <div class="result-row">
                <span class="result-label">Gross Salary</span>
                <span class="result-value" id="grossSalary"></span>
            </div>
            <div class="result-row">
                <span class="result-label">Tax Rate</span>
                <span class="result-value" id="taxRate"></span>
            </div>
            <div class="result-row">
                <span class="result-label">Tax Amount</span>
                <span class="result-value" id="taxAmount"></span>
            </div>
            <div class="result-row">
                <span class="result-label">Net Salary</span>
                <span class="result-total" id="netSalary"></span>
            </div>
        </div>
    </div>

    <script>
        function calculateTax() {
            const salary = parseFloat(document.getElementById('salary').value);

            if (!salary || salary <= 0) {
                alert('Please enter a valid salary!');
                return;
            }

            let taxRate;
            let taxRateLabel;

            if (salary < 30000) {
                taxRate = 0.05;
                taxRateLabel = '5%';
            } else if (salary <= 70000) {
                taxRate = 0.15;
                taxRateLabel = '15%';
            } else {
                taxRate = 0.25;
                taxRateLabel = '25%';
            }

            const taxAmount = salary * taxRate;
            const netSalary = salary - taxAmount;

            document.getElementById('taxBadge').textContent = 'Tax Rate: ' + taxRateLabel;
            document.getElementById('grossSalary').textContent = '$' + salary.toLocaleString();
            document.getElementById('taxRate').textContent = taxRateLabel;
            document.getElementById('taxAmount').textContent = '$' + taxAmount.toLocaleString();
            document.getElementById('netSalary').textContent = '$' + netSalary.toLocaleString();

            document.getElementById('result').classList.add('show');
        }

        document.getElementById('salary').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') calculateTax();
        });
    </script>

</body>
</html>
