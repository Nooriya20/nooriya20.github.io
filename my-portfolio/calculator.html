<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator | Nooriya Ilyas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #6c63ff;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .back-btn:hover {
            color: #a78bfa;
        }

        h1 {
            color: white;
            font-size: 1rem;
            font-weight: 400;
            margin-bottom: 20px;
            color: rgba(255,255,255,0.4);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .calculator {
            background: #1c1c1e;
            border-radius: 30px;
            padding: 20px;
            width: 320px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.8);
        }

        .display {
            text-align: right;
            padding: 20px 10px;
            margin-bottom: 10px;
        }

        .display .expression {
            color: rgba(255,255,255,0.4);
            font-size: 1rem;
            min-height: 24px;
            margin-bottom: 5px;
        }

        .display .result {
            color: white;
            font-size: 3.5rem;
            font-weight: 300;
            letter-spacing: -2px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            border: none;
            border-radius: 50%;
            width: 65px;
            height: 65px;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.1s;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        button:active {
            transform: scale(0.93);
        }

        .btn-gray {
            background: #a5a5a5;
            color: black;
            font-weight: 500;
        }

        .btn-gray:hover {
            background: #c0c0c0;
        }

        .btn-dark {
            background: #333335;
            color: white;
        }

        .btn-dark:hover {
            background: #4a4a4c;
        }

        .btn-orange {
            background: #ff9f0a;
            color: white;
        }

        .btn-orange:hover {
            background: #ffb340;
        }

        .btn-zero {
            grid-column: span 2;
            border-radius: 35px;
            text-align: left;
            padding-left: 25px;
            width: 100%;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← Back to Portfolio</a>

    <h1>Calculator</h1>

    <div class="calculator">
        <div class="display">
            <div class="expression" id="expression"></div>
            <div class="result" id="result">0</div>
        </div>
        <div class="buttons">
            <button class="btn-gray" onclick="clearAll()">AC</button>
            <button class="btn-gray" onclick="toggleSign()">+/-</button>
            <button class="btn-gray" onclick="percentage()">%</button>
            <button class="btn-orange" onclick="setOperator('/')">÷</button>

            <button class="btn-dark" onclick="appendNumber('7')">7</button>
            <button class="btn-dark" onclick="appendNumber('8')">8</button>
            <button class="btn-dark" onclick="appendNumber('9')">9</button>
            <button class="btn-orange" onclick="setOperator('*')">×</button>

            <button class="btn-dark" onclick="appendNumber('4')">4</button>
            <button class="btn-dark" onclick="appendNumber('5')">5</button>
            <button class="btn-dark" onclick="appendNumber('6')">6</button>
            <button class="btn-orange" onclick="setOperator('-')">−</button>

            <button class="btn-dark" onclick="appendNumber('1')">1</button>
            <button class="btn-dark" onclick="appendNumber('2')">2</button>
            <button class="btn-dark" onclick="appendNumber('3')">3</button>
            <button class="btn-orange" onclick="setOperator('+')">+</button>

            <button class="btn-dark btn-zero" onclick="appendNumber('0')">0</button>
            <button class="btn-dark" onclick="appendDecimal()">.</button>
            <button class="btn-orange" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        let currentNumber = '0';
        let previousNumber = '';
        let operator = '';
        let shouldResetDisplay = false;

        function updateDisplay(value) {
            document.getElementById('result').textContent = value;
        }

        function updateExpression(value) {
            document.getElementById('expression').textContent = value;
        }

        function appendNumber(num) {
            if (shouldResetDisplay) {
                currentNumber = num;
                shouldResetDisplay = false;
            } else {
                currentNumber = currentNumber === '0' ? num : currentNumber + num;
            }
            updateDisplay(currentNumber);
        }

        function appendDecimal() {
            if (!currentNumber.includes('.')) {
                currentNumber += '.';
                updateDisplay(currentNumber);
            }
        }

        function setOperator(op) {
            previousNumber = currentNumber;
            operator = op;
            shouldResetDisplay = true;
            const symbols = {'+':'+', '-':'−', '*':'×', '/':'÷'};
            updateExpression(previousNumber + ' ' + symbols[op]);
        }

        function calculate() {
            if (!operator || !previousNumber) return;
            const prev = parseFloat(previousNumber);
            const curr = parseFloat(currentNumber);
            let result;
            switch(operator) {
                case '+': result = prev + curr; break;
                case '-': result = prev - curr; break;
                case '*': result = prev * curr; break;
                case '/': result = curr === 0 ? 'Error' : prev / curr; break;
            }
            updateExpression(previousNumber + ' ' + operator + ' ' + currentNumber + ' =');
            currentNumber = result.toString();
            updateDisplay(currentNumber);
            operator = '';
            shouldResetDisplay = true;
        }

        function clearAll() {
            currentNumber = '0';
            previousNumber = '';
            operator = '';
            shouldResetDisplay = false;
            updateDisplay('0');
            updateExpression('');
        }

        function toggleSign() {
            currentNumber = (parseFloat(currentNumber) * -1).toString();
            updateDisplay(currentNumber);
        }

        function percentage() {
            currentNumber = (parseFloat(currentNumber) / 100).toString();
            updateDisplay(currentNumber);
        }
    </script>

</body>
</html>
